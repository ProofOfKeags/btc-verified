name: Claude

on:
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened]
  issues:
    types: [opened, assigned, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude:
    # Gate before the job starts: the Lean toolchain + mathlib cache setup
    # below is too expensive to run on every comment, so only proceed when
    # the triggering comment, review, PR description, or issue actually
    # mentions @claude — or when an issue is given the `claude` label (the
    # assignment-like gesture; the app bot itself is not assignable, so the
    # label stands in for assigning the issue to Claude).
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'claude')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Same cache as ci.yml's lake-build job, keyed identically so a cache
      # warmed by either workflow benefits the other (the GitHub Actions
      # cache is scoped per-repo, not per-workflow).
      - uses: actions/cache@v4
        with:
          path: |
            .lake
            ~/.elan
          key: ${{ runner.os }}-lake-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-

      # Install elan and fetch the mathlib olean cache (`lake exe cache get`)
      # without building, so Claude's own `lake build` doesn't rebuild
      # mathlib from source and eat the whole time budget. The GitHub cache
      # also persists this repo's build artifacts across runs.
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true

      # Model is scoped to the triggering actor: the maintainer's runs get
      # Fable 5, anyone else authorized (future collaborators, allowlisted
      # bots) falls back to Sonnet 5 so they can't draw down Fable usage.
      # Actors without write access are refused by the action itself before
      # any model is invoked.
      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model ${{ github.actor == 'ProofOfKeags' && 'claude-fable-5' || 'claude-sonnet-5' }}

      # Open the PR that issue-driven Claude runs stop short of creating.
      # claude-code-action deliberately never runs `gh pr create` itself; it
      # hands back a quick-pull link instead. But clicking that link makes
      # the clicker the PR author, and GitHub blocks review/approval of
      # one's own PRs — so for review separation the bot must be the opener.
      # Doing it as a deterministic step (option 2 from the issue-22 thread)
      # keeps Claude's own tool surface unchanged. The Claude App token from
      # the action's output is used rather than the workflow GITHUB_TOKEN
      # because PRs created with GITHUB_TOKEN don't trigger `pull_request`
      # workflows — CI would silently skip the new PR.
      - name: Open PR for Claude's branch
        if: >-
          steps.claude.outputs.branch_name != '' &&
          (github.event_name == 'issues' ||
          (github.event_name == 'issue_comment' && !github.event.issue.pull_request))
        env:
          GH_TOKEN: ${{ steps.claude.outputs.github_token }}
          BRANCH: ${{ steps.claude.outputs.branch_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # branch_name is set even for runs that never push (e.g. Q&A-only
          # answers), so only open a PR for a branch that exists on the
          # remote, is ahead of master, and doesn't already have one.
          if ! git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null; then
            echo "Branch $BRANCH was never pushed; nothing to open."
            exit 0
          fi
          ahead=$(gh api "repos/$GITHUB_REPOSITORY/compare/master...$BRANCH" --jq .ahead_by)
          if [ "$ahead" -eq 0 ]; then
            echo "Branch $BRANCH has no commits beyond master; nothing to open."
            exit 0
          fi
          if [ -n "$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            echo "An open PR for $BRANCH already exists."
            exit 0
          fi
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH" \
            --base master \
            --title "$ISSUE_TITLE" \
            --body "Automated PR for the @claude run on #${ISSUE_NUMBER}; see that issue's thread for the run's summary and verification notes.

          Closes #${ISSUE_NUMBER}."
