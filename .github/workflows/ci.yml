name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lake-build:
    name: lake build & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # `lake build` covers the default targets: the library plus Tests
      # (golden vectors and the axiom audit, which fails on `sorry`).
      # `lake test` decodes the block-481824 fixture through the verified
      # block codec.
      - uses: leanprover/lean-action@v1
        with:
          build: true
          test: true
          lint: true

  nix-develop:
    name: nix develop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Check flake
        run: nix flake check
      - name: Fetch mathlib cache through dev shell
        run: nix develop -c lake exe cache get
      - name: Build through dev shell
        run: nix develop -c lake build
